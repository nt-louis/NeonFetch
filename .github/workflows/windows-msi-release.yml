name: Build And Upload Windows MSI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload MSI to (e.g. 0.0.4) or latest"
        required: false
        default: "latest"

permissions:
  contents: write

jobs:
  build-msi:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            requested="${{ github.event.inputs.tag }}"

            if [ -z "$requested" ] || [ "$requested" = "latest" ]; then
              latest_tag="$(curl -fsSL \
                -H "Authorization: Bearer ${{ github.token }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
                | sed -n 's/.*"tag_name": "\([^"]*\)".*/\1/p' | head -n1)"

              if [ -z "$latest_tag" ]; then
                echo "Failed to resolve latest release tag" >&2
                exit 1
              fi

              echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"
            else
              echo "tag=$requested" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build MSI
        run: npm run dist:win

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
